<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Good Morning ☀️</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body, html {
    height: 100%;
    overflow: hidden;
}

/* Background */
.background {
    position: absolute;
    width: 110%;
    height: 110%;
    background: url('download.jpg') no-repeat center center/cover;
    animation: moveBg 30s infinite alternate ease-in-out;
    filter: brightness(0.7);
}

.sunrise {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(to top, rgba(255,150,80,0.5), rgba(255,200,150,0.2), transparent);
}

@keyframes moveBg {
    0% { transform: scale(1) translate(0, 0); }
    100% { transform: scale(1.1) translate(-20px, -20px); }
}

/* Content */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

.box {
    background: rgba(213, 104, 104, 0.2);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    color: white;
    max-width: 700px;
}

/* Text */
#text {
    font-size: 1.8rem;
    line-height: 1.6;
    min-height: 150px;
}

.sun {
    font-size: 2.5rem;
    margin-top: 20px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { transform: scale(1); opacity: 0.8; }
    to { transform: scale(1.2); opacity: 1; }
}

/* Floating lights */
.light {
    position: absolute;
    width: 6px;
    height: 6px;
    background: rgba(255,255,200,0.8);
    border-radius: 50%;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    to {
        transform: translateY(-110vh);
        opacity: 0;
    }
}

/* Start Screen */
.start-screen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 1.5rem;
    z-index: 10;
    cursor: pointer;
    text-align: center;
}
</style>
</head>

<body>

<!-- Start Screen -->
<div class="start-screen" onclick="startExperience()">
    tap mo screen hehe ☀️
</div>

<div class="background"></div>
<div class="sunrise"></div>

<div class="overlay">
    <div class="box">
        <div id="text"></div>
        <div class="sun">☀️</div>
    </div>
</div>

<!-- Music -->
<audio id="music" loop>
    <source src="Treasure - Bruno Mars.mp3" type="audio/mpeg">
</audio>

<script>
// MESSAGE
const message = `good morninggg bb ☀️

i hope you slept well...

di ako makatulog kagabi kaya eto muna, kasi mabubusy ka mamaya baka tulog pako kaya eto baon para sumaya lang morning mo,
para may bago din 
hindi yung puro goodmorning lang sa chat hahahahhaha 



iloveyouuu yung tubig mo :)))
imisssyousoomichhhhahahahahahahahaha`;

let i = 0;

// Start everything after tap
function startExperience() {
    document.querySelector(".start-screen").style.display = "none";
    startMusic();
    typeText();
    startLights();
}

// Typing
function typeText() {
    const textEl = document.getElementById("text");

    if (i < message.length) {
        textEl.innerHTML += message.charAt(i);
        i++;
        setTimeout(typeText, 40);
    }
}

// Music (chorus start + fade in)
function startMusic() {
    const music = document.getElementById("music");

    music.currentTime = 30; // CHANGE THIS to your chorus time
    music.volume = 0;

    music.play();

    let vol = 0;
    const fade = setInterval(() => {
        if (vol < 1) {
            vol += 0.05;
            music.volume = vol;
        } else {
            clearInterval(fade);
        }
    }, 200);
}

// Floating lights
function startLights() {
    setInterval(() => {
        const light = document.createElement("div");
        light.classList.add("light");
        light.style.left = Math.random() * 100 + "vw";
        light.style.animationDuration = (4 + Math.random() * 3) + "s";
        document.body.appendChild(light);

        setTimeout(() => light.remove(), 7000);
    }, 200);
}
</script>

</body>
</html>
